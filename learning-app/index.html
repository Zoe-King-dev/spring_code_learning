<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spring Boot 源码学习</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/content.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/phase3.css">

  <!-- Mermaid for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <!-- Marked for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Highlight.js for code -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

  <!-- D3.js v7 for knowledge graph -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <style>
    /* ============ 教育平台增强样式 ============ */

    /* 英雄区域 */
    .hero-section {
      background: linear-gradient(135deg, var(--color-primary) 0%, #667eea 100%);
      color: white;
      padding: 3rem 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
      text-align: center;
    }

    .hero-section h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: white;
    }

    .hero-section p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    /* 章节卡片网格 */
    .chapter-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .chapter-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .chapter-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
      border-color: var(--color-primary);
    }

    .chapter-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-primary), #667eea);
    }

    .chapter-card .card-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .chapter-card .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--color-text);
    }

    .chapter-card .card-desc {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    .chapter-card .card-meta {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .difficulty-tag {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .diff-easy { background: #e8f5e9; color: #2e7d32; }
    .diff-core { background: #e3f2fd; color: #1565c0; }
    .diff-advanced { background: #fff3e0; color: #ef6c00; }
    .diff-applied { background: #f3e5f5; color: #7b1fa2; }
    .diff-hard { background: #ffebee; color: #c62828; }

    /* 知识点卡片 */
    .knowledge-card {
      background: var(--color-surface);
      border-left: 4px solid var(--color-primary);
      border-radius: 0 8px 8px 0;
      padding: 1.25rem;
      margin: 1.5rem 0;
    }

    .knowledge-card.tip {
      border-left-color: #4caf50;
      background: #f8fff8;
    }

    .knowledge-card.warning {
      border-left-color: #ff9800;
      background: #fffbf0;
    }

    .knowledge-card.key-concept {
      border-left-color: #2196f3;
      background: #f0f7ff;
    }

    .knowledge-card .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    .knowledge-card .card-content {
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* 架构图区域 */
    .diagram-container {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: center;
    }

    .diagram-container .diagram-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--color-text);
    }

    .mermaid {
      display: flex;
      justify-content: center;
    }

    /* 代码对比 */
    .code-comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    @media (max-width: 768px) {
      .code-comparison {
        grid-template-columns: 1fr;
      }
    }

    .code-block-enhanced {
      background: var(--color-code-bg);
      border-radius: 8px;
      overflow: hidden;
    }

    .code-block-enhanced .code-header {
      background: rgba(0,0,0,0.2);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: var(--color-code-text);
      display: flex;
      justify-content: space-between;
    }

    .code-block-enhanced pre {
      margin: 0;
      padding: 1rem;
      overflow-x: auto;
    }

    /* 流程步骤 */
    .flow-steps {
      margin: 1.5rem 0;
    }

    .flow-step {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--color-border);
    }

    .flow-step:last-child {
      border-bottom: none;
    }

    .step-number {
      width: 32px;
      height: 32px;
      background: var(--color-primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-content {
      flex: 1;
    }

    .step-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .step-desc {
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }

    /* 交互式图表 */
    .interactive-diagram {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }

    .diagram-controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .diagram-btn {
      padding: 0.5rem 1rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .diagram-btn:hover, .diagram-btn.active {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    /* 进度追踪 */
    .progress-tracker {
      background: var(--color-surface);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1rem 0;
    }

    .progress-bar-container {
      background: var(--color-border);
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
      margin: 1rem 0;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), #667eea);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    /* 学习模式切换 */
    .mode-toggle {
      display: flex;
      background: var(--color-bg);
      border-radius: 8px;
      padding: 4px;
      gap: 4px;
    }

    .mode-btn {
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--color-primary);
      color: white;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .hero-section {
        padding: 2rem 1rem;
      }

      .hero-section h1 {
        font-size: 1.5rem;
      }

      .chapter-cards {
        grid-template-columns: 1fr;
      }
    }

    /* 渲染内容的增强样式 */
    .rendered-content .hero-inline {
      background: linear-gradient(135deg, var(--color-primary) 0%, #667eea 100%);
      color: white;
      padding: 2rem;
      border-radius: 12px;
      margin: 1.5rem 0;
    }

    .rendered-content .hero-inline h2 {
      color: white;
      margin-bottom: 1rem;
    }

    .rendered-content .inline-diagram {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: center;
    }

    .rendered-content .comparison-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .rendered-content .comparison-item {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 1rem;
    }

    .rendered-content .comparison-item h4 {
      margin-top: 0;
      color: var(--color-primary);
    }

    /* ============ 库洛米吉祥物 ============ */
    .topbar-mascot {
      width: 32px;
      height: 32px;
      vertical-align: middle;
      margin-right: 8px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      display: inline-block;
    }

    .topbar-mascot:hover {
      transform: rotate(-12deg) scale(1.15);
    }

    .topbar-logo {
      display: inline-flex;
      align-items: center;
    }

    /* 首页 hero 里的库洛米 */
    .hero-kuromi {
      width: 96px;
      height: 96px;
      margin: 0 auto 1rem;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
      animation: kuromi-float 3s ease-in-out infinite;
    }

    @keyframes kuromi-float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
  </style>
</head>
<body>

<div class="shell">
  <!-- ============ 顶栏 ============ -->
  <header class="topbar" id="topbar">
    <span class="topbar-logo" id="topbar-logo">
      <img src="assets/kuromi.svg" alt="Kuromi" class="topbar-mascot" />
      <span>Spring Boot 源码学习</span>
    </span>
    <div class="topbar-actions">
      <div class="mode-toggle" id="mode-toggle">
        <button class="mode-btn active" data-mode="read">阅读</button>
        <button class="mode-btn" data-mode="learn">学习</button>
      </div>
      <div class="search-wrap" id="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="搜索全书...">
        <div class="search-panel" id="search-panel"></div>
      </div>
      <button class="tb-btn" id="btn-bookmarks" title="书签 (B)">🔖</button>
      <button class="tb-btn" id="btn-progress-panel" title="学习进度">📊</button>
      <button class="tb-btn" id="btn-quiz-center" title="测验中心（综合测验 / 错题本 / 成就）">🏆</button>
      <button class="tb-btn" id="btn-theme" title="切换主题">🌙</button>
    </div>
  </header>

  <!-- ============ 学习路线图 ============ -->
  <section class="roadmap" id="roadmap">
    <div class="roadmap-inner" id="roadmap-inner"></div>
    <button class="roadmap-toggle" id="roadmap-toggle" title="折叠路线图">▴ 收起路线图</button>
  </section>

  <!-- ============ 阅读区 ============ -->
  <div class="reader" id="reader">
    <!-- 章内目录侧栏 -->
    <aside class="toc-sidebar" id="toc-sidebar">
      <div class="toc-header">
        <span class="toc-title">📑 本章目录</span>
        <span class="toc-progress" id="toc-progress"></span>
      </div>
      <nav class="toc-nav" id="toc-nav"></nav>
    </aside>

    <!-- 主内容 -->
    <main class="main-content rendered-content" id="main-content"></main>
  </div>

  <!-- ============ 底部导航 ============ -->
  <footer class="bottom-nav">
    <button class="nav-btn" id="nav-prev"></button>
    <button class="nav-btn nav-btn--next" id="nav-next"></button>
  </footer>
</div>

<!-- ============ 浮动元素 ============ -->
<div class="bookmark-panel" id="bookmark-panel">
  <div class="panel-head">
    <h3>🔖 书签</h3>
    <button class="btn btn--ghost btn--sm" id="bookmark-close">✕</button>
  </div>
  <div id="bookmark-list"></div>
</div>

<div class="progress-panel" id="progress-panel">
  <div class="panel-head">
    <h3>📊 学习进度</h3>
    <button class="btn btn--ghost btn--sm" id="progress-close">✕</button>
  </div>
  <div id="progress-detail"></div>
</div>

<button class="back-to-top" id="back-to-top" title="回到顶部">↑</button>
<div class="toast" id="toast"></div>

<!-- ============ JS ============ -->
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/renderer.js"></script>
<script src="js/router.js"></script>
<script src="js/search.js"></script>
<script src="js/ui.js"></script>
<script src="js/quiz.js"></script>
<script src="js/diagrams.js"></script>
<script src="js/achievement.js"></script>
<script src="js/knowledge-graph.js"></script>
<script src="js/learning-path.js"></script>
<script src="js/callchain.js"></script>
<script src="js/source-refs.js"></script>
<script src="js/notes.js"></script>
<script src="js/quiz-center.js"></script>
<script src="js/chapter-intros.js"></script>
<script src="js/learning-mode.js"></script>
<script src="js/app.js"></script>

<script>
  // 初始化 Mermaid（其他逻辑已迁出到 js/learning-mode.js、js/chapter-intros.js、js/app.js）
  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
    flowchart: { useMaxWidth: true, htmlLabels: true },
    sequence: { useMaxWidth: true }
  });
</script>
</body>
</html>
